<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engenho Editor — Kaique Mota</title>
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#0a0a0a; }</style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SHOP_W = 34, SHOP_D = 26;
    const PIECE_TEMPLATES = [
      { label:"Máquina C", type:"machine",  w:3, d:2, color:"#ff8800" },
      { label:"Máquina B", type:"machine",  w:2, d:2, color:"#ffaa00" },
      { label:"Operador",  type:"operator", w:1, d:1, color:"#ffdd00" },
      { label:"Produto",   type:"product",  w:2, d:1, color:"#4488ff" },
      { label:"Estoque",   type:"stock",    w:3, d:3, color:"#44ffaa" },
    ];
    const PALETTE = ["#ff4444","#ff8800","#ffdd00","#44ff88","#4488ff","#cc44ff","#ff44aa","#44ffff","#ffffff","#aaaaaa","#ff6600","#00ffcc"];

    let _id = 200;
    const uid = () => ++_id;

    const INIT_PIECES = [
      { id:1,  label:"Máq C-1", type:"machine",  x:2,  z:2,  w:3, d:2, color:"#ff8800", icon:null, cap:10, unit:"pç/h" },
      { id:2,  label:"Máq C-2", type:"machine",  x:8,  z:2,  w:3, d:2, color:"#ff8800", icon:null, cap:10, unit:"pç/h" },
      { id:3,  label:"Máq B-1", type:"machine",  x:2,  z:7,  w:2, d:2, color:"#ffaa00", icon:null, cap:8,  unit:"pç/h" },
      { id:4,  label:"Máq B-2", type:"machine",  x:8,  z:7,  w:2, d:2, color:"#ffaa00", icon:null, cap:8,  unit:"pç/h" },
      { id:5,  label:"Op 1",    type:"operator", x:6,  z:3,  w:1, d:1, color:"#ffdd00", icon:null, cap:0,  unit:"" },
      { id:6,  label:"Op 2",    type:"operator", x:6,  z:8,  w:1, d:1, color:"#ffdd00", icon:null, cap:0,  unit:"" },
      { id:7,  label:"Prod A",  type:"product",  x:18, z:15, w:2, d:1, color:"#4488ff", icon:null, cap:0,  unit:"" },
      { id:8,  label:"Prod B",  type:"product",  x:22, z:15, w:2, d:1, color:"#4488ff", icon:null, cap:0,  unit:"" },
      { id:9,  label:"Estoque", type:"stock",    x:28, z:18, w:3, d:3, color:"#44ffaa", icon:null, cap:200,unit:"pç"  },
    ];
    const INIT_ZONES = [
      { id:10, label:"Produção", x:1,  z:1,  w:14, d:12, borderColor:"#ff4444", fillOpacity:0.15, icon:null },
      { id:11, label:"Estoque",  x:24, z:14, w:9,  d:10, borderColor:"#4488ff", fillOpacity:0.15, icon:null },
    ];
    const INIT_ARROWS = [
      { id:uid(), fromId:1, toId:3 },
      { id:uid(), fromId:3, toId:7 },
    ];
    const INIT_SUPPLIERS = [
      { id:"s1", label:"Fornecedor 1", color:"#cc44ff" },
      { id:"s2", label:"Fornecedor 2", color:"#ff44aa" },
      { id:"s3", label:"Fornecedor 3", color:"#44ffff" },
    ];

    function hexToRgb(h){ return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
    function overlaps(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.z<b.z+b.d&&a.z+a.d>b.z; }
    function centerPx(p,cell){ return { x:(p.x+p.w/2)*cell, y:(p.z+p.d/2)*cell }; }

    function useDevice(){
      const [d,setD]=useState("pc");
      useEffect(()=>{
        const c=()=>setD(window.innerWidth<600?"mobile":window.innerWidth<1100?"tablet":"pc");
        c(); window.addEventListener("resize",c);
        return()=>window.removeEventListener("resize",c);
      },[]);
      return d;
    }

    function ColorPicker({value,onChange}){
      return(
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          {PALETTE.map(c=>(
            <div key={c} onClick={()=>onChange(c)} style={{width:18,height:18,background:c,borderRadius:3,cursor:"pointer",flexShrink:0,border:value===c?"2px solid #fff":"2px solid transparent",boxSizing:"border-box"}}/>
          ))}
          <input type="color" value={value} onChange={e=>onChange(e.target.value)} style={{width:18,height:18,padding:0,border:"none",cursor:"pointer",background:"none",flexShrink:0}}/>
        </div>
      );
    }

    function Arrow({from,to}){
      const dx=to.x-from.x,dy=to.y-from.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/d,uy=dy/d,gap=10;
      const x1=from.x+ux*gap,y1=from.y+uy*gap,x2=to.x-ux*gap,y2=to.y-uy*gap;
      const mid="ah"+Math.round(x1)+"_"+Math.round(y1);
      return(
        <g>
          <defs>
            <marker id={mid} markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
              <path d="M0,0 L0,7 L7,3.5 z" fill="#ff6600"/>
            </marker>
          </defs>
          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#ff6600" strokeWidth="2.5"
            markerEnd={`url(#${mid})`} strokeDasharray="7 3" opacity={0.9}>
            <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="0.7s" repeatCount="indefinite"/>
          </line>
        </g>
      );
    }

    function StableInput({value, onCommit, placeholder, style, type="text"}){
      const [local, setLocal] = useState(value);
      const ref = useRef(null);
      useEffect(()=>{ if(document.activeElement!==ref.current) setLocal(value); },[value]);
      return(
        <input
          ref={ref} type={type} value={local} placeholder={placeholder}
          onChange={e=>setLocal(e.target.value)}
          onBlur={()=>onCommit(local)}
          onKeyDown={e=>{ if(e.key==="Enter"){ onCommit(local); ref.current?.blur(); } e.stopPropagation(); }}
          style={{width:"100%",padding:"5px 7px",background:"#0d0d0d",border:"1px solid #333",color:"#ddd",fontSize:10,boxSizing:"border-box",borderRadius:2,...style}}
        />
      );
    }

    const LS_AUTO = "engenho_autosave";
    const LS_SLOTS = "engenho_slots";

    function loadAuto(){
      try{
        const raw=localStorage.getItem(LS_AUTO);
        if(!raw)return null;
        return JSON.parse(raw);
      }catch(e){return null;}
    }
    function loadSlots(){
      try{
        const raw=localStorage.getItem(LS_SLOTS);
        if(!raw)return [];
        return JSON.parse(raw);
      }catch(e){return [];}
    }

    function App(){
      const device  = useDevice();
      const BASE_CELL = device==="mobile"?12:device==="tablet"?16:20;
      const isPort  = device==="mobile";
      const [zoom,setZoom] = useState(1);
      const CELL = BASE_CELL * zoom;

      const [pieces,   setPieces]   = useState(()=>{const a=loadAuto();return a?.pieces   ||INIT_PIECES;});
      const [zones,    setZones]    = useState(()=>{const a=loadAuto();return a?.zones    ||INIT_ZONES;});
      const [arrows,   setArrows]   = useState(()=>{const a=loadAuto();return a?.arrows   ||INIT_ARROWS;});
      const [suppliers,setSuppliers]= useState(()=>{const a=loadAuto();return a?.suppliers||INIT_SUPPLIERS;});
      const [selected, setSelected] = useState(null);
      const [dragging, setDragging] = useState(null);
      const [resizing, setResizing] = useState(null);
      const [arrowMode,setArrowMode]= useState(false);
      const [arrowFrom,setArrowFrom]= useState(null);
      const [selBox,   setSelBox]   = useState(null);
      const [multiSel, setMultiSel] = useState([]);
      const [multiDrag,setMultiDrag]= useState(null);
      const [boxMode,  setBoxMode]  = useState(false);
      const [tab,      setTab]      = useState("pieces");
      const [layouts,  setLayouts]  = useState(loadSlots);
      const [layoutName,setLayoutName]=useState("Layout_01");
      const [lastSaved,setLastSaved]= useState(()=>{const a=loadAuto();return a?new Date(a.ts):null;});
      const [ctxMenu,  setCtxMenu]  = useState(null); // {x,y,kind,id} or {x,y,kind:"multi"}

      // ── autosave whenever state changes ──────────────────────────────
      useEffect(()=>{
        const data={pieces,zones,arrows,suppliers,ts:Date.now()};
        try{ localStorage.setItem(LS_AUTO,JSON.stringify(data)); }catch(e){}
        setLastSaved(new Date());
      },[pieces,zones,arrows,suppliers]);
      const [addLabel, setAddLabel] = useState("");
      const [addTmpl,  setAddTmpl]  = useState(0);
      const [zLabel,   setZLabel]   = useState("Nova Zona");
      const [zColor,   setZColor]   = useState("#ff4444");
      const [showFlow, setShowFlow] = useState(true);
      const [showMetrics,setShowMetrics]=useState(false);
      const gridRef = useRef(null);
      const wrapRef = useRef(null);

      const collisions = new Set();
      for(let i=0;i<pieces.length;i++)
        for(let j=i+1;j<pieces.length;j++)
          if(overlaps(pieces[i],pieces[j])){ collisions.add(pieces[i].id); collisions.add(pieces[j].id); }

      const clampP=p=>({...p,x:Math.max(0,Math.min(SHOP_W-p.w,p.x)),z:Math.max(0,Math.min(SHOP_D-p.d,p.z))});
      const clampZ=z=>({...z,x:Math.max(0,Math.min(SHOP_W-1,z.x)),z:Math.max(0,Math.min(SHOP_D-1,z.z)),w:Math.max(1,Math.min(SHOP_W-z.x,z.w)),d:Math.max(1,Math.min(SHOP_D-z.z,z.d))});

      const gxy=useCallback(e=>{
        const r=gridRef.current?.getBoundingClientRect(); if(!r) return{gx:0,gz:0};
        const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
        return{gx:Math.floor((cx-r.left)/CELL),gz:Math.floor((cy-r.top)/CELL)};
      },[CELL]);

      useEffect(()=>{
        const onKey=e=>{
          const tag=document.activeElement?.tagName;
          if(tag==="INPUT"||tag==="TEXTAREA") return;
          if(e.key==="3"){ setBoxMode(b=>!b); setMultiSel([]); setSelBox(null); return; }
          if(e.key==="Delete"||e.key==="Backspace"){
            if(multiSel.length>0){
              const ids=new Set(multiSel.map(s=>s.id));
              setPieces(ps=>ps.filter(p=>!ids.has(p.id)));
              setZones(zs=>zs.filter(z=>!ids.has(z.id)));
              setArrows(as=>as.filter(a=>!ids.has(a.fromId)&&!ids.has(a.toId)));
              setMultiSel([]); return;
            }
            if(selected){
              if(selected.kind==="piece"){ setPieces(ps=>ps.filter(p=>p.id!==selected.id)); setArrows(as=>as.filter(a=>a.fromId!==selected.id&&a.toId!==selected.id)); }
              else setZones(zs=>zs.filter(z=>z.id!==selected.id));
              setSelected(null);
            }
          }
          if(e.key==="m"||e.key==="M"){ if(multiSel.length>0) setMultiDrag("pending"); }
          if(e.key==="d"||e.key==="D"){
            if(selected?.kind==="piece"){ const p=pieces.find(p=>p.id===selected.id); if(p){const np={...p,id:uid(),x:Math.min(SHOP_W-p.w,p.x+1),z:Math.min(SHOP_D-p.d,p.z+1)};setPieces(ps=>[...ps,np]);setSelected({kind:"piece",id:np.id});} }
            else if(selected?.kind==="zone"){ const z=zones.find(z=>z.id===selected.id); if(z){const nz={...z,id:uid(),x:Math.min(SHOP_W-1,z.x+1),z:Math.min(SHOP_D-1,z.z+1)};setZones(zs=>[...zs,nz]);setSelected({kind:"zone",id:nz.id});} }
          }
          if(e.key==="f"||e.key==="F") setShowFlow(f=>!f);
          if(e.key==="Escape"){ setSelected(null);setArrowMode(false);setArrowFrom(null);setBoxMode(false);setMultiSel([]);setSelBox(null);setMultiDrag(null); }
        };
        window.addEventListener("keydown",onKey);
        return()=>window.removeEventListener("keydown",onKey);
      },[selected,multiSel,pieces,zones]);

      useEffect(()=>{
        const onWheel=e=>{
          if(!e.shiftKey) return;
          e.preventDefault();
          const factor=e.deltaY<0?1.12:1/1.12;
          const el=wrapRef.current; if(!el) return;
          const rect=el.getBoundingClientRect();
          const cx=e.clientX-rect.left+el.scrollLeft;
          const cy=e.clientY-rect.top+el.scrollTop;
          setZoom(z=>{
            const newZ=Math.min(4,Math.max(0.3,z*factor));
            const scale=newZ/z;
            el.scrollLeft=cx*scale-(e.clientX-rect.left);
            el.scrollTop=cy*scale-(e.clientY-rect.top);
            return newZ;
          });
        };
        const el=wrapRef.current;
        el?.addEventListener("wheel",onWheel,{passive:false});
        return()=>el?.removeEventListener("wheel",onWheel);
      },[]);

      const onGridMouseDown=(e)=>{
        if(!boxMode||arrowMode) return;
        const{gx,gz}=gxy(e);
        const mode=e.button===2?"delete":"move";
        setSelBox({startX:gx,startZ:gz,endX:gx,endZ:gz,mode});
        setMultiSel([]);
        e.preventDefault();
      };

      const onPieceDown=(e,id)=>{
        if(arrowMode){
          if(arrowFrom===null){setArrowFrom(id);return;}
          if(arrowFrom!==id){setArrows(as=>[...as,{id:uid(),fromId:arrowFrom,toId:id}]);}
          setArrowFrom(null);setArrowMode(false);return;
        }
        e.preventDefault();e.stopPropagation();
        const{gx,gz}=gxy(e);const p=pieces.find(p=>p.id===id);
        setDragging({kind:"piece",id,ox:gx-p.x,oz:gz-p.z});setSelected({kind:"piece",id});
      };
      const onZoneDown=(e,id)=>{e.preventDefault();e.stopPropagation();const{gx,gz}=gxy(e);const z=zones.find(z=>z.id===id);setDragging({kind:"zone",id,ox:gx-z.x,oz:gz-z.z});setSelected({kind:"zone",id});};
      const onResDown=(e,kind,id,edge)=>{e.preventDefault();e.stopPropagation();const{gx,gz}=gxy(e);const o=(kind==="zone"?zones:pieces).find(o=>o.id===id);setResizing({kind,id,edge,sgx:gx,sgz:gz,ox:o.x,oz:o.z,ow:o.w,od:o.d});setSelected({kind,id});};

      useEffect(()=>{
        const mv=e=>{
          const{gx,gz}=gxy(e);
          if(selBox){setSelBox(s=>({...s,endX:gx,endZ:gz}));return;}
          if(multiDrag&&multiDrag!=="pending"){
            const dx=gx-multiDrag.startGX,dz=gz-multiDrag.startGZ;
            setPieces(ps=>ps.map(p=>{const orig=multiDrag.origPositions.find(o=>o.kind==="piece"&&o.id===p.id);return orig?clampP({...p,x:orig.x+dx,z:orig.z+dz}):p;}));
            setZones(zs=>zs.map(z=>{const orig=multiDrag.origPositions.find(o=>o.kind==="zone"&&o.id===z.id);return orig?clampZ({...z,x:orig.x+dx,z:orig.z+dz}):z;}));
            return;
          }
          if(dragging){
            if(dragging.kind==="piece") setPieces(ps=>ps.map(p=>p.id===dragging.id?clampP({...p,x:gx-dragging.ox,z:gz-dragging.oz}):p));
            else setZones(zs=>zs.map(z=>z.id===dragging.id?clampZ({...z,x:gx-dragging.ox,z:gz-dragging.oz}):z));
          }
          if(resizing){
            const dx=gx-resizing.sgx,dz=gz-resizing.sgz;
            const upd=o=>{let{x,z,w,d}={x:resizing.ox,z:resizing.oz,w:resizing.ow,d:resizing.od};
              if(resizing.edge==="e")  w=Math.max(1,resizing.ow+dx);
              if(resizing.edge==="s")  d=Math.max(1,resizing.od+dz);
              if(resizing.edge==="se"){w=Math.max(1,resizing.ow+dx);d=Math.max(1,resizing.od+dz);}
              if(resizing.edge==="w"){x=resizing.ox+dx;w=Math.max(1,resizing.ow-dx);}
              if(resizing.edge==="n"){z=resizing.oz+dz;d=Math.max(1,resizing.od-dz);}
              return{...o,x,z,w,d};
            };
            if(resizing.kind==="zone") setZones(zs=>zs.map(z=>z.id===resizing.id?clampZ(upd(z)):z));
            else setPieces(ps=>ps.map(p=>p.id===resizing.id?clampP(upd(p)):p));
          }
        };
        const up=e=>{
          if(selBox){
            const minX=Math.min(selBox.startX,selBox.endX),maxX=Math.max(selBox.startX,selBox.endX);
            const minZ=Math.min(selBox.startZ,selBox.endZ),maxZ=Math.max(selBox.startZ,selBox.endZ);
            const inBox=o=>o.x>=minX&&o.x+o.w-1<=maxX&&o.z>=minZ&&o.z+o.d-1<=maxZ;
            const sel=[...pieces.filter(p=>inBox(p)).map(p=>({kind:"piece",id:p.id})),...zones.filter(z=>inBox(z)).map(z=>({kind:"zone",id:z.id}))];
            if(selBox.mode==="delete"){
              const ids=new Set(sel.map(s=>s.id));
              setPieces(ps=>ps.filter(p=>!ids.has(p.id)));
              setZones(zs=>zs.filter(z=>!ids.has(z.id)));
              setArrows(as=>as.filter(a=>!ids.has(a.fromId)&&!ids.has(a.toId)));
              setMultiSel([]);
            } else { setMultiSel(sel); }
            setSelBox(null);return;
          }
          if(multiDrag){setMultiDrag(null);return;}
          setDragging(null);setResizing(null);
        };
        window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
        window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
        return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);};
      },[dragging,resizing,selBox,multiDrag,gxy]);

      const doAddPiece=()=>{
        const tmpl=PIECE_TEMPLATES[addTmpl];
        const label=addLabel.trim()||`${tmpl.label} ${pieces.length+1}`;
        setPieces(ps=>[...ps,{id:uid(),label,type:tmpl.type,x:0,z:0,w:tmpl.w,d:tmpl.d,color:tmpl.color,icon:null,cap:0,unit:"pç/h"}]);
        setAddLabel("");
      };
      const doAddZone=()=>setZones(zs=>[...zs,{id:uid(),label:zLabel||"Zona",x:1,z:1,w:6,d:4,borderColor:zColor,fillOpacity:0.15,icon:null}]);
      const doDelete=()=>{
        if(!selected)return;
        if(selected.kind==="piece"){setPieces(ps=>ps.filter(p=>p.id!==selected.id));setArrows(as=>as.filter(a=>a.fromId!==selected.id&&a.toId!==selected.id));}
        else setZones(zs=>zs.filter(z=>z.id!==selected.id));
        setSelected(null);
      };
      const updP=(id,f,v)=>setPieces(ps=>ps.map(p=>p.id===id?{...p,[f]:v}:p));
      const updZ=(id,f,v)=>setZones(zs=>zs.map(z=>z.id===id?{...z,[f]:v}:z));
      const onIconUpload=(id,kind,e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>kind==="piece"?updP(id,"icon",ev.target.result):updZ(id,"icon",ev.target.result);reader.readAsDataURL(file);};
      const doSave=()=>{
        const slot={name:layoutName,pieces:JSON.parse(JSON.stringify(pieces)),zones:JSON.parse(JSON.stringify(zones)),arrows:JSON.parse(JSON.stringify(arrows)),savedAt:new Date().toLocaleString("pt-BR")};
        setLayouts(ls=>{
          const updated=[...ls,slot];
          try{ localStorage.setItem(LS_SLOTS,JSON.stringify(updated)); }catch(e){}
          return updated;
        });
        setLayoutName(`Layout_${String(layouts.length+2).padStart(2,"0")}`);
      };
      const doDeleteSlot=(i)=>{
        setLayouts(ls=>{
          const updated=ls.filter((_,idx)=>idx!==i);
          try{ localStorage.setItem(LS_SLOTS,JSON.stringify(updated)); }catch(e){}
          return updated;
        });
      };
      const doLoad=l=>{setPieces(l.pieces.map(p=>({...p,id:uid()})));setZones((l.zones||[]).map(z=>({...z,id:uid()})));setArrows((l.arrows||[]).map(a=>({...a,id:uid()})));setSelected(null);};

      // ── context menu (right-click) actions ───────────────────────────
      const openCtx=(e,kind,id)=>{
        e.preventDefault();e.stopPropagation();
        setCtxMenu({x:e.clientX,y:e.clientY,kind,id});
      };
      const closeCtx=()=>setCtxMenu(null);

      const ctxDuplicate=()=>{
        if(!ctxMenu)return;
        if(ctxMenu.kind==="multi"){
          // duplicate entire multiSel
          const newPieces=[];const newZones=[];
          pieces.filter(p=>multiSel.some(s=>s.kind==="piece"&&s.id===p.id)).forEach(p=>{
            const np={...p,id:uid(),x:Math.min(SHOP_W-p.w,p.x+1),z:Math.min(SHOP_D-p.d,p.z+1)};
            newPieces.push(np);
          });
          zones.filter(z=>multiSel.some(s=>s.kind==="zone"&&s.id===z.id)).forEach(z=>{
            const nz={...z,id:uid(),x:Math.min(SHOP_W-1,z.x+1),z:Math.min(SHOP_D-1,z.z+1)};
            newZones.push(nz);
          });
          setPieces(ps=>[...ps,...newPieces]);
          setZones(zs=>[...zs,...newZones]);
          setMultiSel([...newPieces.map(p=>({kind:"piece",id:p.id})),...newZones.map(z=>({kind:"zone",id:z.id}))]);
        } else if(ctxMenu.kind==="piece"){
          const p=pieces.find(p=>p.id===ctxMenu.id);
          if(p){const np={...p,id:uid(),x:Math.min(SHOP_W-p.w,p.x+1),z:Math.min(SHOP_D-p.d,p.z+1)};setPieces(ps=>[...ps,np]);setSelected({kind:"piece",id:np.id});}
        } else if(ctxMenu.kind==="zone"){
          const z=zones.find(z=>z.id===ctxMenu.id);
          if(z){const nz={...z,id:uid(),x:Math.min(SHOP_W-1,z.x+1),z:Math.min(SHOP_D-1,z.z+1)};setZones(zs=>[...zs,nz]);setSelected({kind:"zone",id:nz.id});}
        }
        closeCtx();
      };
      const ctxDelete=()=>{
        if(!ctxMenu)return;
        if(ctxMenu.kind==="multi"){
          const ids=new Set(multiSel.map(s=>s.id));
          setPieces(ps=>ps.filter(p=>!ids.has(p.id)));
          setZones(zs=>zs.filter(z=>!ids.has(z.id)));
          setArrows(as=>as.filter(a=>!ids.has(a.fromId)&&!ids.has(a.toId)));
          setMultiSel([]);setSelected(null);
        } else if(ctxMenu.kind==="piece"){
          setPieces(ps=>ps.filter(p=>p.id!==ctxMenu.id));
          setArrows(as=>as.filter(a=>a.fromId!==ctxMenu.id&&a.toId!==ctxMenu.id));
          if(selected?.id===ctxMenu.id)setSelected(null);
        } else if(ctxMenu.kind==="zone"){
          setZones(zs=>zs.filter(z=>z.id!==ctxMenu.id));
          if(selected?.id===ctxMenu.id)setSelected(null);
        }
        closeCtx();
      };
      const ctxEdit=()=>{
        if(!ctxMenu)return;
        setSelected({kind:ctxMenu.kind,id:ctxMenu.id});
        setTab("edit");closeCtx();
      };

      const totalArea=SHOP_W*SHOP_D,usedArea=pieces.reduce((s,p)=>s+p.w*p.d,0),pct=((usedArea/totalArea)*100).toFixed(1);

      const selP=selected?.kind==="piece"?pieces.find(p=>p.id===selected.id):null;
      const selZ=selected?.kind==="zone"?zones.find(z=>z.id===selected.id):null;

      const RH=({edge,kind,id,color="#fff"})=>(
        <div onMouseDown={e=>onResDown(e,kind,id,edge)} onTouchStart={e=>onResDown(e,kind,id,edge)}

            ...(edge==="e"?{right:-4,top:"25%",width:8,height:"50%",cursor:"ew-resize"}:{}),
            ...(edge==="s"?{bottom:-4,left:"25%",height:8,width:"50%",cursor:"ns-resize"}:{}),
            ...(edge==="se"?{right:-5,bottom:-5,width:10,height:10,cursor:"se-resize"}:{}),
            ...(edge==="w"?{left:-4,top:"25%",width:8,height:"50%",cursor:"ew-resize"}:{}),
            ...(edge==="n"?{top:-4,left:"25%",height:8,width:"50%",cursor:"ns-resize"}:{}),
          }}
        />
      );

      const Slider=({label,min,max,value,onChange,accent,suffix})=>(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:9,color:"#888",marginBottom:2}}>{label}</div>
          <input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)} style={{width:"100%",accentColor:accent||"#ff6600"}}/>
          <div style={{fontSize:9,color:accent||"#ff6600",textAlign:"right"}}>{value}{suffix||"m"}</div>
        </div>
      );

      const panelW=device==="tablet"?240:280;

      return(
        <div onClick={()=>ctxMenu&&closeCtx()} style={{display:"flex",flexDirection:isPort?"column":"row",height:"100vh",width:"100%",overflow:"hidden",background:"#0a0a0a",fontFamily:"monospace",color:"#fff",position:"relative"}}>
          {ctxMenu&&(
            <div onClick={e=>e.stopPropagation()} style={{position:"fixed",left:ctxMenu.x,top:ctxMenu.y,zIndex:9999,background:"#1a1a1a",border:"1px solid #ff6600",borderRadius:4,boxShadow:"0 4px 24px #000a",minWidth:160,overflow:"hidden"}}>
              <div style={{padding:"5px 10px",fontSize:8,color:"#555",borderBottom:"1px solid #222",textTransform:"uppercase",letterSpacing:1}}>

              <button onClick={ctxDuplicate} style={{display:"block",width:"100%",padding:"9px 14px",background:"transparent",border:"none",color:"#00ff88",cursor:"pointer",fontSize:11,fontWeight:"bold",textAlign:"left",borderBottom:"1px solid #222"}}>⧉ Duplicar{ctxMenu.kind==="multi"?` (${multiSel.length})`:""}</button>
              {ctxMenu.kind!=="multi"&&<button onClick={ctxEdit} style={{display:"block",width:"100%",padding:"9px 14px",background:"transparent",border:"none",color:"#ffdd00",cursor:"pointer",fontSize:11,fontWeight:"bold",textAlign:"left",borderBottom:"1px solid #222"}}>✏️ Editar</button>}
              <button onClick={ctxDelete} style={{display:"block",width:"100%",padding:"9px 14px",background:"transparent",border:"none",color:"#ff4444",cursor:"pointer",fontSize:11,fontWeight:"bold",textAlign:"left"}}>🗑 Remover{ctxMenu.kind==="multi"?` (${multiSel.length})`:""}</button>
            </div>
          )}
          <div ref={wrapRef} style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:isPort?"6px 2px":"12px 8px",minWidth:0,minHeight:0}}>
            <div style={{marginBottom:6,color:"#ff6600",fontSize:isPort?9:11,letterSpacing:2,textTransform:"uppercase",fontWeight:"bold",textAlign:"center"}}>
              ⚙ KAIQUE MOTA — Editor de Layout
            </div>
            <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap",justifyContent:"center",alignItems:"center"}}>
              <button onClick={()=>setShowFlow(f=>!f)} style={{padding:"4px 9px",background:showFlow?"#ff6600":"#1a1a1a",color:showFlow?"#000":"#ff6600",border:"1px solid #ff6600",cursor:"pointer",fontSize:9,borderRadius:2,fontWeight:"bold"}}>🔀 Fluxo {showFlow?"ON":"OFF"}</button>
              <button onClick={()=>{if(arrowMode){setArrowMode(false);setArrowFrom(null);}else{setArrowMode(true);setArrowFrom(null);}}} style={{padding:"4px 9px",background:arrowMode?"#ffdd00":"#1a1a1a",color:arrowMode?"#000":"#ffdd00",border:"1px solid #ffdd00",cursor:"pointer",fontSize:9,borderRadius:2,fontWeight:"bold"}}>{arrowMode?(arrowFrom?"🎯 Clique destino":"🎯 Clique origem"):"➡ Seta"}</button>
              {arrows.length>0&&<button onClick={()=>setArrows(as=>as.slice(0,-1))} style={{padding:"4px 9px",background:"#1a1a1a",color:"#f66",border:"1px solid #f66",cursor:"pointer",fontSize:9,borderRadius:2,fontWeight:"bold"}}>✕ Última</button>}
              <button onClick={()=>{setBoxMode(b=>!b);setMultiSel([]);setSelBox(null);}} style={{padding:"4px 9px",background:boxMode?"#00ffff":"#1a1a1a",color:boxMode?"#000":"#00ffff",border:"1px solid #00ffff",cursor:"pointer",fontSize:9,borderRadius:2,fontWeight:"bold"}}>⬜ Seleção {boxMode?"ON":"OFF"} [3]</button>

                <div><span style={{color:"#aaa"}}>Ocupado:</span> {usedArea}m²</div>

                <div><span style={{color:"#aaa"}}>Zonas:</span> {zones.length}</div>
                {collisions.size>0&&<div style={{color:"#f66",fontWeight:"bold"}}>⚠ {Math.floor(collisions.size/2)} colisão(ões)</div>}

            )}

                      <span style={{color:s.color,fontSize:8,fontWeight:"bold",textAlign:"center",writingMode:"vertical-rl",textOrientation:"mixed",transform:"rotate(180deg)",letterSpacing:1,textTransform:"uppercase",lineHeight:1.2,padding:"4px 0",pointerEvents:"none"}}>{s.label}</span>
                      <div style={{position:"absolute",right:-1,top:"50%",transform:"translateY(-50%)",width:0,height:0,borderTop:"6px solid transparent",borderBottom:"6px solid transparent",borderLeft:`8px solid ${s.color}`,opacity:.8}}/>
                    </div>

                </div>

              <div ref={gridRef}

                  backgroundSize:`${CELL}px ${CELL}px`,border:"2px solid #ff6600",

                        const inMultiSel=multiSel.some(s=>s.kind==="zone"&&s.id===z.id);
                        openCtx(e,inMultiSel&&multiSel.length>1?"multi":"zone",z.id);
                      }}
                      style={{position:"absolute",left:z.x*CELL,top:z.z*CELL,width:z.w*CELL,height:z.d*CELL,

                        border:`2px dashed ${inMulti?"#00ffff":z.borderColor}`,boxSizing:"border-box",cursor:"move",zIndex:0,

                      <span style={{position:"absolute",top:2,left:4,fontSize:8,fontWeight:"bold",color:z.borderColor,pointerEvents:"none",letterSpacing:1,textShadow:"0 0 4px #000"}}>{z.label}</span>

                    </div>

                })}
                {showFlow&&(
                  <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:5}} overflow="visible">
                    {arrows.map(a=>{
                      const fp=pieces.find(p=>p.id===a.fromId),tp=pieces.find(p=>p.id===a.toId);
                      if(!fp||!tp)return null;
                      return <Arrow key={a.id} from={centerPx(fp,CELL)} to={centerPx(tp,CELL)}/>;
                    })}
                  </svg>
                )}
                {pieces.map(p=>{
                  const isCol=collisions.has(p.id),isSel=selected?.kind==="piece"&&selected.id===p.id;
                  const isOrigin=arrowFrom===p.id;
                  const inMulti=multiSel.some(s=>s.kind==="piece"&&s.id===p.id);
                  return(
                    <div key={p.id}
                      onContextMenu={e=>{
                        const inMultiSel=multiSel.some(s=>s.kind==="piece"&&s.id===p.id);
                        openCtx(e,inMultiSel&&multiSel.length>1?"multi":"piece",p.id);
                      }}
                      onMouseDown={e=>{
                        const inMultiSel=multiSel.some(s=>s.kind==="piece"&&s.id===p.id);
                        if((boxMode||multiDrag==="pending")&&multiSel.length>0&&inMultiSel){
                          e.preventDefault();e.stopPropagation();
                          const{gx,gz}=gxy(e);
                          setMultiDrag({startGX:gx,startGZ:gz,origPositions:[
                            ...pieces.filter(p=>multiSel.some(s=>s.kind==="piece"&&s.id===p.id)).map(p=>({kind:"piece",id:p.id,x:p.x,z:p.z})),
                            ...zones.filter(z=>multiSel.some(s=>s.kind==="zone"&&s.id===z.id)).map(z=>({kind:"zone",id:z.id,x:z.x,z:z.z})),
                          ]});
                          return;
                        }
                        onPieceDown(e,p.id);
                      }}
                      onTouchStart={e=>onPieceDown(e,p.id)}
                      style={{position:"absolute",left:p.x*CELL,top:p.z*CELL,width:p.w*CELL-2,height:p.d*CELL-2,
                        background:p.icon?`url(${p.icon}) center/cover`:(isCol?"rgba(255,0,0,.55)":p.color+"cc"),
                        border:isOrigin?"3px solid #ffdd00":inMulti?"2px solid #00ffff":isSel?"2px solid #fff":isCol?"2px solid #f00":`2px solid ${p.color}`,
                        boxShadow:isOrigin?"0 0 16px #ffdd00":inMulti?"0 0 10px #00ffff88":isSel?"0 0 12px #fff8":isCol?"0 0 10px #f008":`0 0 6px ${p.color}88`,
                        cursor:arrowMode?"crosshair":"grab",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",
                        fontSize:Math.min(p.w,p.d)>=2?"8px":"6px",fontWeight:"bold",color:p.icon?"transparent":"#000",
                        textAlign:"center",lineHeight:1.2,zIndex:isSel?10:inMulti?8:2,touchAction:"none",overflow:"hidden",borderRadius:2}}
                    >
                      {!p.icon&&<span>{p.label}</span>}
                      {!p.icon&&p.cap>0&&<span style={{fontSize:"6px",opacity:.8,marginTop:1}}>{p.cap}{p.unit}</span>}
                      {p.icon&&<span style={{position:"absolute",bottom:1,left:0,right:0,textAlign:"center",fontSize:6,fontWeight:"bold",color:"#fff",textShadow:"0 0 3px #000",pointerEvents:"none"}}>{p.label}</span>}
                      {isSel&&!arrowMode&&["e","s","se"].map(edge=><RH key={edge} edge={edge} kind="piece" id={p.id}/>)}
                    </div>
                  );
                })}
                {selBox&&(()=>{
                  const x1=Math.min(selBox.startX,selBox.endX)*CELL,y1=Math.min(selBox.startZ,selBox.endZ)*CELL;
                  const w=(Math.abs(selBox.endX-selBox.startX)+1)*CELL,h=(Math.abs(selBox.endZ-selBox.startZ)+1)*CELL;
                  const isDel=selBox.mode==="delete";
                  return(
                    <div style={{position:"absolute",left:x1,top:y1,width:w,height:h,
                      border:`2px dashed ${isDel?"#ff4444":"#00ffff"}`,
                      background:isDel?"rgba(255,68,68,0.1)":"rgba(0,255,255,0.08)",
                      pointerEvents:"none",zIndex:50,boxSizing:"border-box"}}>
                      <div style={{position:"absolute",top:2,left:4,fontSize:8,fontWeight:"bold",color:isDel?"#ff4444":"#00ffff"}}>{isDel?"🗑 DELETAR":"↔ MOVER"}</div>
                    </div>
                  );
                })()}
                {multiSel.length>0&&multiDrag!=="pending"&&(
                  <div style={{position:"absolute",top:-42,left:0,display:"flex",gap:6,zIndex:60,flexWrap:"wrap"}}>
                    <div style={{padding:"4px 10px",background:"#00ffff22",border:"1px solid #00ffff",borderRadius:2,fontSize:9,color:"#00ffff",fontWeight:"bold"}}>{multiSel.length} selecionado{multiSel.length>1?"s":""}</div>
                    <div style={{padding:"4px 10px",background:"#ffdd0022",border:"1px solid #ffdd00",borderRadius:2,fontSize:9,color:"#ffdd00"}}><b>M</b> = mover · <b>Del</b> = excluir</div>
                    <button onClick={()=>setMultiSel([])} style={{padding:"4px 10px",background:"#33333388",border:"1px solid #555",borderRadius:2,fontSize:9,color:"#aaa",cursor:"pointer"}}>✕</button>
                  </div>
                )}
                {multiDrag==="pending"&&(
                  <div style={{position:"absolute",top:-42,left:0,zIndex:60}}>
                    <div style={{padding:"4px 12px",background:"#ff880033",border:"1px solid #ff8800",borderRadius:2,fontSize:9,color:"#ff8800",fontWeight:"bold"}}>🖱 Clique em qualquer peça selecionada e arraste</div>
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:7,textAlign:"center",color:"#444",fontSize:9}}>Grid: {SHOP_W}×{SHOP_D}m · Arraste · Alças = redimensionar</div>
            <div style={{marginTop:3,textAlign:"center",fontSize:8,color:"#333",letterSpacing:.5}}>
              Protótipo de estudo realizado por <span style={{color:"#ff6600",fontWeight:"bold"}}>Kaique Mota</span> · Aluno 9º Semestre · Engenharia de Produção · <span style={{color:"#555"}}>Engenho Treinamentos</span>
            </div>
          </div>

          <div style={{width:isPort?"100%":panelW,minWidth:isPort?"unset":panelW,maxHeight:isPort?280:"unset",background:"#111",borderLeft:isPort?"none":"2px solid #ff6600",borderTop:isPort?"2px solid #ff6600":"none",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{display:"flex",borderBottom:"1px solid #ff6600",flexShrink:0}}>
              {[["pieces","📋"],["zones","🟦"],["add","➕"],["edit","✏️"],["save","💾"]].map(([t,icon])=>(
                <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"7px 0",background:tab===t?"#ff6600":"transparent",color:tab===t?"#000":"#ff6600",border:"none",cursor:"pointer",fontWeight:"bold",fontSize:10}}>{icon}</button>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:10}}>
              {tab==="pieces"&&<>
                {collisions.size>0&&<div style={{background:"#ff000022",border:"1px solid #f00",padding:8,marginBottom:10,fontSize:10,color:"#f66"}}>⚠️ {Math.floor(collisions.size/2)} colisão(ões)</div>}
                <div style={{fontSize:9,color:"#555",marginBottom:8}}>Del=excluir · D=duplicar · F=fluxo · 3=seleção</div>
                {pieces.length===0&&<div style={{color:"#555",fontSize:10,textAlign:"center",padding:"20px 0"}}>Nenhuma peça. Use ➕.</div>}
                {pieces.map(p=>(
                  <div key={p.id} onClick={()=>{setSelected({kind:"piece",id:p.id});setTab("edit");}} style={{padding:"6px 8px",marginBottom:4,background:selected?.id===p.id?"#ff660022":"#181818",border:selected?.id===p.id?"1px solid #ff6600":"1px solid #2a2a2a",cursor:"pointer",fontSize:10,borderRadius:2,borderLeft:`3px solid ${collisions.has(p.id)?"#f00":p.color}`,display:"flex",alignItems:"center",gap:6}}>
                    {p.icon?<img src={p.icon} style={{width:14,height:14,objectFit:"cover",borderRadius:2,flexShrink:0}}/>:<div style={{width:10,height:10,background:p.color,borderRadius:2,flexShrink:0}}/>}
                    <span style={{fontWeight:"bold",flex:1}}>{p.label}</span>
                    {p.cap>0&&<span style={{color:"#666",fontSize:8}}>{p.cap}{p.unit}</span>}
                  </div>
                ))}
                {arrows.length>0&&<>
                  <div style={{color:"#ff6600",fontSize:9,marginTop:12,marginBottom:6,textTransform:"uppercase",fontWeight:"bold"}}>Fluxo</div>
                  {arrows.map(a=>{
                    const fp=pieces.find(p=>p.id===a.fromId),tp=pieces.find(p=>p.id===a.toId);
                    if(!fp||!tp)return null;
                    const d=Math.sqrt((fp.x+fp.w/2-(tp.x+tp.w/2))**2+(fp.z+fp.d/2-(tp.z+tp.d/2))**2).toFixed(1);
                    return(
                      <div key={a.id} style={{padding:"5px 8px",marginBottom:3,background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:2,fontSize:9,display:"flex",alignItems:"center",gap:6}}>
                        <span style={{color:"#ff6600",flex:1}}>{fp.label} → {tp.label}</span>
                        <span style={{color:"#555"}}>{d}m</span>
                        <button onClick={()=>setArrows(as=>as.filter(a2=>a2.id!==a.id))} style={{background:"none",border:"none",color:"#f66",cursor:"pointer",fontSize:11,padding:0}}>✕</button>
                      </div>
                    );
                  })}
                </>}
              </>}

                  <div key={z.id} onClick={()=>{setSelected({kind:"zone",id:z.id});setTab("edit");}} style={{padding:"6px 8px",marginBottom:4,background:selected?.id===z.id?"#6699ff22":"#181818",border:selected?.id===z.id?"1px solid #6699ff":"1px solid #2a2a2a",cursor:"pointer",fontSize:10,borderRadius:2,borderLeft:`3px solid ${z.borderColor}`,display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:10,height:10,background:z.borderColor,borderRadius:2,flexShrink:0,opacity:.8}}/>
                    <span style={{fontWeight:"bold",flex:1,color:z.borderColor}}>{z.label}</span>
                    <span style={{color:"#555",fontSize:9}}>{z.w}×{z.d}m</span>
                  </div>
                ))}
                <div style={{color:"#aaa",fontSize:9,marginTop:14,marginBottom:8,textTransform:"uppercase",fontWeight:"bold",borderTop:"1px solid #222",paddingTop:10}}>Fornecedores</div>
                {suppliers.map(s=>(
                  <div key={s.id} style={{marginBottom:8,padding:"8px",background:"#181818",border:"1px solid #2a2a2a",borderRadius:2,borderLeft:`3px solid ${s.color}`}}>
                    <StableInput value={s.label} onCommit={v=>setSuppliers(ss=>ss.map(x=>x.id===s.id?{...x,label:v}:x))}/>
                    <ColorPicker value={s.color} onChange={v=>setSuppliers(ss=>ss.map(x=>x.id===s.id?{...x,color:v}:x))}/>
                  </div>
                ))}
              </>}
              {tab==="add"&&<>
                <div style={{color:"#ff6600",fontSize:10,marginBottom:10,fontWeight:"bold",textTransform:"uppercase"}}>➕ Nova Peça</div>
                <div style={{fontSize:9,color:"#888",marginBottom:4}}>Tipo base</div>
                <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
                  {PIECE_TEMPLATES.map((t,i)=>(
                    <div key={i} onClick={()=>setAddTmpl(i)} style={{padding:"7px 10px",background:addTmpl===i?t.color+"44":"#181818",border:`1px solid ${addTmpl===i?t.color:"#333"}`,cursor:"pointer",borderRadius:2,fontSize:10,color:t.color,fontWeight:"bold",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,background:t.color,borderRadius:2,flexShrink:0}}/>
                      {t.label} <span style={{fontSize:8,opacity:.6,marginLeft:"auto"}}>{t.w}×{t.d}m</span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:9,color:"#888",marginBottom:3}}>Nome</div>
                <StableInput value={addLabel} onCommit={setAddLabel} placeholder={`${PIECE_TEMPLATES[addTmpl].label} ${pieces.length+1}`}/>
                <button onClick={doAddPiece} style={{width:"100%",padding:10,background:"#ff6600",color:"#000",border:"none",cursor:"pointer",fontWeight:"bold",fontSize:12,borderRadius:2,marginTop:12}}>➕ Adicionar</button>
              </>}
              {tab==="edit"&&<>
                <div style={{color:"#ffdd00",fontSize:10,marginBottom:10,fontWeight:"bold",textTransform:"uppercase"}}>✏️ Editar</div>
                {!selP&&!selZ&&<div style={{color:"#555",fontSize:10,padding:"20px 0",textAlign:"center"}}>Clique em uma peça ou zona no grid</div>}
                {selP&&<>
                  <div style={{color:"#ff6600",fontSize:11,marginBottom:10,fontWeight:"bold"}}>🔧 Peça</div>
                  <div style={{fontSize:9,color:"#888",marginBottom:3}}>Nome</div>
                  <StableInput value={selP.label} onCommit={v=>updP(selP.id,"label",v)}/>
                  <div style={{fontSize:9,color:"#888",margin:"8px 0 3px"}}>Cor</div>
                  <ColorPicker value={selP.color} onChange={v=>updP(selP.id,"color",v)}/>
                  <div style={{fontSize:9,color:"#888",margin:"10px 0 3px"}}>Capacidade</div>
                  <div style={{display:"flex",gap:4,marginBottom:10}}>
                    <input type="number" value={selP.cap} onChange={e=>updP(selP.id,"cap",+e.target.value)} onKeyDown={e=>e.stopPropagation()} style={{flex:1,padding:"5px 7px",background:"#0d0d0d",border:"1px solid #333",color:"#ddd",fontSize:10,borderRadius:2}}/>
                    <input type="text" value={selP.unit} onChange={e=>updP(selP.id,"unit",e.target.value)} onKeyDown={e=>e.stopPropagation()} placeholder="unid." style={{width:55,padding:"5px 7px",background:"#0d0d0d",border:"1px solid #333",color:"#ddd",fontSize:10,borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:9,color:"#888",marginBottom:4}}>Ícone PNG</div>
                  {selP.icon&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><img src={selP.icon} style={{width:32,height:32,objectFit:"cover",borderRadius:4,border:"1px solid #444"}}/><button onClick={()=>updP(selP.id,"icon",null)} style={{padding:"3px 8px",background:"#ff3333",color:"#fff",border:"none",cursor:"pointer",fontSize:9,borderRadius:2}}>✕</button></div>}
                  <label style={{display:"block",padding:"7px",background:"#1a1a1a",border:"1px dashed #555",borderRadius:2,cursor:"pointer",fontSize:9,color:"#aaa",textAlign:"center",marginBottom:12}}>
                    📁 {selP.icon?"Trocar":"Carregar"} ícone
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>onIconUpload(selP.id,"piece",e)}/>
                  </label>
                  <Slider label="Largura (m)" min={1} max={10} value={selP.w} onChange={v=>updP(selP.id,"w",v)} accent="#ff6600"/>
                  <Slider label="Profundidade (m)" min={1} max={10} value={selP.d} onChange={v=>updP(selP.id,"d",v)} accent="#ff6600"/>
                  <button onClick={doDelete} style={{width:"100%",padding:8,background:"#ff3333",color:"#fff",border:"none",cursor:"pointer",fontWeight:"bold",fontSize:10,borderRadius:2}}>🗑 Remover</button>
                </>}
                {selZ&&<>
                  <div style={{color:"#6699ff",fontSize:11,marginBottom:10,fontWeight:"bold"}}>🟦 Zona</div>
                  <div style={{fontSize:9,color:"#888",marginBottom:3}}>Nome</div>
                  <StableInput value={selZ.label} onCommit={v=>updZ(selZ.id,"label",v)}/>
                  <div style={{fontSize:9,color:"#888",margin:"8px 0 3px"}}>Cor da borda</div>
                  <ColorPicker value={selZ.borderColor} onChange={v=>updZ(selZ.id,"borderColor",v)}/>
                  <div style={{fontSize:9,color:"#888",marginTop:10,marginBottom:4}}>Imagem/Textura</div>
                  {selZ.icon&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><img src={selZ.icon} style={{width:32,height:32,objectFit:"cover",borderRadius:4,border:"1px solid #444"}}/><button onClick={()=>updZ(selZ.id,"icon",null)} style={{padding:"3px 8px",background:"#ff3333",color:"#fff",border:"none",cursor:"pointer",fontSize:9,borderRadius:2}}>✕</button></div>}
                  <label style={{display:"block",padding:"7px",background:"#1a1a1a",border:"1px dashed #555",borderRadius:2,cursor:"pointer",fontSize:9,color:"#aaa",textAlign:"center",marginBottom:10}}>
                    📁 {selZ.icon?"Trocar":"Carregar"}
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>onIconUpload(selZ.id,"zone",e)}/>
                  </label>
                  <Slider label="Opacidade fill" min={0} max={50} value={Math.round(selZ.fillOpacity*100)} onChange={v=>updZ(selZ.id,"fillOpacity",v/100)} accent="#6699ff" suffix="%"/>
                  <Slider label="Largura (m)" min={1} max={SHOP_W} value={selZ.w} onChange={v=>updZ(selZ.id,"w",v)} accent="#6699ff"/>
                  <Slider label="Profundidade (m)" min={1} max={SHOP_D} value={selZ.d} onChange={v=>updZ(selZ.id,"d",v)} accent="#6699ff"/>
                  <button onClick={doDelete} style={{width:"100%",padding:8,background:"#ff3333",color:"#fff",border:"none",cursor:"pointer",fontWeight:"bold",fontSize:10,borderRadius:2}}>🗑 Remover</button>
                </>}
              </>}
              {tab==="save"&&<>
                <div style={{color:"#00ff66",fontSize:10,marginBottom:6,fontWeight:"bold",textTransform:"uppercase"}}>💾 Salvar Layout</div>
                <div style={{padding:"6px 8px",marginBottom:10,background:"#001a00",border:"1px solid #00ff6633",borderRadius:2,fontSize:9,color:"#00cc55"}}>
                  🔄 Autosave ativo · {lastSaved?`Último: ${lastSaved.toLocaleTimeString("pt-BR")}`:"aguardando..."}
                  <br/><span style={{color:"#555",fontSize:8}}>Salvo automaticamente no navegador</span>
                </div>
                <div style={{fontSize:9,color:"#888",marginBottom:3}}>Nome do slot</div>
                <StableInput value={layoutName} onCommit={setLayoutName} placeholder="Nome"/>
                <button onClick={doSave} style={{width:"100%",padding:10,background:"#00ff66",color:"#000",border:"none",cursor:"pointer",fontWeight:"bold",fontSize:11,borderRadius:2,marginTop:8,marginBottom:14}}>💾 Salvar slot</button>
                {layouts.length>0&&<>
                  <div style={{color:"#6699ff",fontSize:10,marginBottom:8,fontWeight:"bold",textTransform:"uppercase"}}>📂 Slots Salvos</div>
                  {layouts.map((l,i)=>(
                    <div key={i} style={{marginBottom:5,background:"#6699ff11",border:"1px solid #6699ff44",borderRadius:2,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center"}}>
                        <button onClick={()=>doLoad(l)} style={{flex:1,padding:"7px 8px",background:"transparent",border:"none",color:"#6699ff",cursor:"pointer",fontSize:10,fontWeight:"bold",textAlign:"left"}}>
                          📂 {l.name} <span style={{opacity:.5,fontSize:8}}>({l.pieces.length}p)</span>
                        </button>
                        <button onClick={()=>doDeleteSlot(i)} style={{padding:"7px 8px",background:"transparent",border:"none",color:"#f66",cursor:"pointer",fontSize:11}}>✕</button>
                      </div>
                      {l.savedAt&&<div style={{padding:"0 8px 5px",fontSize:8,color:"#445"}}>{l.savedAt}</div>}
                    </div>
                  ))}
                </>}
                <div style={{marginTop:16,borderTop:"1px solid #1a1a1a",paddingTop:12}}>
                  <button onClick={()=>{if(window.confirm("Limpar o autosave e resetar para o estado inicial?")){try{localStorage.removeItem(LS_AUTO);}catch(e){}setPieces(INIT_PIECES);setZones(INIT_ZONES);setArrows(INIT_ARROWS);setSuppliers(INIT_SUPPLIERS);setSelected(null);}}} style={{width:"100%",padding:7,background:"transparent",border:"1px solid #332200",color:"#664400",cursor:"pointer",fontSize:9,borderRadius:2}}>🔄 Resetar para o padrão</button>
                </div>
              </>}
            </div>
            <div style={{padding:8,borderTop:"1px solid #222",fontSize:8,color:"#444",textAlign:"center",flexShrink:0}}>
              Engenho Treinamentos · v8 · {device==="mobile"?"📱":device==="tablet"?"📟":"🖥"}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
